services:
  beanpool-node:
    image: ghcr.io/martyinspace/beanpool-node:latest
    build:
      context: .
      network: host
    ports:
      - "80:8080" # Standard HTTP (for QR poster)
      - "443:8443" # Standard HTTPS (clean URLs)
      - "8080:8080" # Legacy HTTP (fallback while Azure NSG is updated)
      - "8443:8443" # Legacy HTTPS (fallback while Azure NSG is updated)
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - BEANPOOL_DATA_DIR=/data
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - CF_RECORD_NAME=${CF_RECORD_NAME}
      # Cutover: role / backup / enforcement (Phase 1 + SRV-20). Empty defaults =
      # primary role, backup puller off, all enforcement flags off — the safe
      # dormant state. Set per node via the node-local .env (preserved across
      # redeploys by deploy.sh). See docs/SECURITY-CUTOVER-CHECKLIST.md.
      - NODE_ROLE=${NODE_ROLE:-}
      - BACKUP_PRIMARY_URL=${BACKUP_PRIMARY_URL:-}
      - BACKUP_ADMIN_PASSWORD=${BACKUP_ADMIN_PASSWORD:-}
      - BACKUP_PULL_INTERVAL_MS=${BACKUP_PULL_INTERVAL_MS:-}
      - PROMOTED_FROM_BACKUP=${PROMOTED_FROM_BACKUP:-}
      - ENFORCE_READ_AUTH=${ENFORCE_READ_AUTH:-}
      - ENFORCE_WS_AUTH=${ENFORCE_WS_AUTH:-}
      - ENFORCE_LEDGER_AUTH=${ENFORCE_LEDGER_AUTH:-}
      # Diagnostics: on SIGUSR2 (sent by the host watchdog when a node's event
      # loop hangs) Node writes a diagnostic report — including the blocked JS
      # stack — to /data (persisted), so a freeze like 2026-07-18 is diagnosable
      # instead of erased by the restart. Also dumps a report on any uncaught
      # exception. No effect on normal operation. See ops/watchdog/.
      - NODE_OPTIONS=--max-old-space-size=128 --report-on-signal --report-directory=/data --report-uncaught-exception
    volumes:
      - ./data:/data
    networks:
      - default
      - beanpool-shared
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - default
      - beanpool-shared
    profiles:
      - tunnel
    restart: unless-stopped

networks:
  beanpool-shared:
    external: true
